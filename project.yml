name: AudioFunctionGenerator
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.phil.AcoustaLab
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 9
    MARKETING_VERSION: 1.0.0
    DEVELOPMENT_TEAM: 9SZ5257PF4
packages: {}
targets:
  AudioFunctionGenerator:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        excludes:
          - Assets.xcassets
      - path: Resources/Assets.xcassets
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: AcoustaLab
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: BrandBackground
          UIImageName: AppLogo
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: 本应用用于音频测试与信号播放。
    settings:
      base:
        PRODUCT_NAME: AudioFunctionGenerator
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Sources/App/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: Apple Development
        Release:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: Apple Development
    dependencies: []
    scheme:
      testTargets: []
