<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AcoustaLab</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111d;
      --panel: #202a38;
      --text: #f3f7fb;
      --muted: #aab4c2;
      --accent: #47d8f4;
      --stroke: rgba(255, 255, 255, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 80% 5%, rgba(71, 216, 244, 0.16), transparent 34rem),
        linear-gradient(145deg, #070b16, var(--bg));
      color: var(--text);
      line-height: 1.6;
    }
    main {
      width: min(880px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }
    .card {
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      border: 1px solid var(--stroke);
      border-radius: 28px;
      padding: clamp(24px, 5vw, 48px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(40px, 8vw, 72px);
      letter-spacing: -0.06em;
      line-height: 0.96;
    }
    p { color: var(--muted); font-size: 18px; }
    nav {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-top: 28px;
    }
    a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--stroke);
      border-radius: 18px;
      padding: 16px 18px;
      background: rgba(255, 255, 255, 0.05);
    }
    a:hover { border-color: var(--accent); color: var(--accent); }
    .tag {
      display: inline-flex;
      margin-bottom: 18px;
      color: #05131b;
      background: var(--accent);
      border-radius: 999px;
      padding: 6px 12px;
      font-weight: 700;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <div class="tag">Acoustic Signal Lab</div>
      <h1>AcoustaLab</h1>
      <p>A focused acoustic signal generator for tone, sweep, noise, presets, route checks, and local calibration workflows.</p>
      <nav aria-label="Support and privacy links">
        <a href="support-en.html">Support - English</a>
        <a href="privacy-policy-en.html">Privacy Policy - English</a>
        <a href="support-zh-Hans.html">支持 - 中文</a>
        <a href="privacy-policy-zh-Hans.html">隐私政策 - 中文</a>
      </nav>
    </section>
  </main>
</body>
</html>
